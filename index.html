<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wirtschaftsrecht – Karteikarten</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d1117;
  --surf: #161b24;
  --surf2: #1e2636;
  --border: #1e4a6e;
  --teal: #0ea5c9;
  --cyan: #67e8f9;
  --teal-glow: rgba(14,165,201,0.2);
  --amber: #fbbf24;
  --amber-glow: rgba(251,191,36,0.15);
  --green: #34d399;
  --green-bg: #052e16;
  --red: #f87171;
  --red-bg: #450a0a;
  --text: #e2e8f0;
  --muted: #8899aa;
  --dim: #4a5568;
  --r: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 60px;
}

/* ─── SCREENS ─── */
.screen { width: 100%; max-width: 580px; padding: 0 16px; }
.hidden { display: none !important; }

/* ─── HOME ─── */
#home { padding-top: 48px; }

.eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--teal); text-align: center; margin-bottom: 8px;
}

.home-h1 {
  font-family: 'Syne', sans-serif;
  font-size: 28px; font-weight: 800;
  text-align: center; line-height: 1.2; margin-bottom: 6px;
}
.home-h1 em { color: var(--teal); font-style: normal; }

.home-sub { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 36px; }

/* Set cards */
.set-btn {
  display: block;
  width: 100%;
  background: var(--surf);
  border: 2px solid var(--border);
  border-radius: var(--r);
  padding: 22px;
  margin-bottom: 14px;
  cursor: pointer;
  text-align: left;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  /* reset button styles */
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  appearance: none;
  -webkit-appearance: none;
}

.set-btn:active { transform: scale(0.98); }

.set-btn.s1 { border-top: 3px solid var(--teal); }
.set-btn.s1:hover { border-color: var(--teal); box-shadow: 0 8px 28px var(--teal-glow); }

.set-btn.s2 { border-top: 3px solid var(--amber); }
.set-btn.s2:hover { border-color: var(--amber); box-shadow: 0 8px 28px var(--amber-glow); }

.set-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }

.set-badge {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 20px; margin-bottom: 8px;
}
.s1 .set-badge { background: rgba(14,165,201,0.13); color: var(--teal); }
.s2 .set-badge { background: rgba(251,191,36,0.13); color: var(--amber); }

.set-count { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; line-height: 1; }
.s1 .set-count { color: var(--teal); }
.s2 .set-count { color: var(--amber); }
.set-count span { font-size: 12px; font-weight: 400; color: var(--muted); margin-left: 3px; }

.set-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 5px; }
.set-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }

.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--surf2); color: var(--muted); border: 1px solid var(--border); }

.warn {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 7px 10px;
  background: rgba(251,191,36,0.07);
  border: 1px solid rgba(251,191,36,0.25);
  border-radius: 8px; font-size: 12px; color: var(--amber);
}

.arrow { position: absolute; right: 18px; bottom: 18px; font-size: 18px; opacity: 0.2; }

/* ─── QUIZ ─── */
#quiz { padding-top: 24px; }

.qhead { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

.back {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 10px; color: var(--muted);
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  transition: all 0.2s;
  /* reset */
  font-family: inherit; appearance: none; -webkit-appearance: none;
}
.back:hover { border-color: var(--teal); color: var(--teal); }

.qhead-text { flex: 1; }
.qlabel { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
.qtitle { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
.teal { color: var(--teal); }
.amber { color: var(--amber); }

/* Stats row */
.stats {
  display: flex; gap: 0;
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin-bottom: 14px;
}
.stat { flex: 1; text-align: center; padding: 10px 4px; }
.stat + .stat { border-left: 1px solid var(--border); }
.sn { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
.sn.t { color: var(--teal); }
.sn.g { color: var(--green); }
.sn.r { color: var(--red); }
.sl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* Progress */
.pbar-wrap { margin-bottom: 10px; }
.pbar { height: 4px; background: var(--surf2); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
.pfill { height: 100%; border-radius: 2px; transition: width 0.4s ease; width: 0%; }
.pfill.t { background: linear-gradient(90deg, var(--teal), var(--cyan)); }
.pfill.a { background: linear-gradient(90deg, var(--amber), #f59e0b); }
.plabels { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); }

/* Mode buttons */
.modes { display: flex; gap: 8px; margin-bottom: 16px; }
.mbtn {
  flex: 1; padding: 8px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surf);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
  appearance: none; -webkit-appearance: none;
}
.mbtn.at { background: var(--surf2); border-color: var(--teal); color: var(--teal); }
.mbtn.aa { background: var(--surf2); border-color: var(--amber); color: var(--amber); }

/* Flashcard */
.card-area { perspective: 1000px; margin-bottom: 14px; }

.card {
  width: 100%; height: 300px;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }

.face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: var(--r);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 28px 22px; text-align: center;
}

.front {
  background: var(--surf);
  border-bottom: 3px solid transparent;
}
.front.t { border: 1.5px solid var(--border); border-top: 3px solid var(--teal); }
.front.a { border: 1.5px solid #3a2e1a;   border-top: 3px solid var(--amber); }

.back { transform: rotateY(180deg); }
.back.t { background: var(--surf2); border: 1.5px solid rgba(14,165,201,0.35); border-top: 3px solid var(--cyan); }
.back.a { background: var(--surf2); border: 1.5px solid rgba(251,191,36,0.35); border-top: 3px solid var(--amber); }

.clabel {
  font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.clabel::before, .clabel::after { content: ''; flex: 1; max-width: 24px; height: 1px; background: var(--border); }
.clabel.t { color: var(--teal); }
.clabel.a { color: var(--amber); }

.ctext { font-size: 17px; font-weight: 500; line-height: 1.6; color: var(--text); white-space: pre-line; }
.back .ctext { font-size: 15px; font-weight: 400; color: #c8dff0; }

.chint { position: absolute; bottom: 14px; font-size: 11px; color: var(--dim); }

/* Action buttons */
.btns { display: flex; gap: 10px; margin-bottom: 10px; }

.btn {
  flex: 1; padding: 13px;
  border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  appearance: none; -webkit-appearance: none;
}
.btn:active { transform: scale(0.96); }

.bflip { background: var(--surf); color: var(--teal); border: 1px solid var(--border); flex: 0.55; }
.bno   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.byes  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

.abts { display: flex; gap: 10px; flex: 1; }
.abts .btn { opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.abts.show .btn { opacity: 1; pointer-events: all; }

.kbhint { display: flex; gap: 14px; justify-content: center; font-size: 10px; color: var(--dim); }
kbd { background: var(--surf2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted); }

/* Done */
#done {
  padding-top: 32px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 14px;
}
.done-icon { font-size: 50px; }
.done-h { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
.score { display: flex; gap: 24px; background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 14px 26px; }
.sc { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.scn { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
.scn.g { color: var(--green); } .scn.r { color: var(--red); }
.scl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.done-msg { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 320px; }

.dbtn {
  width: 100%; max-width: 340px; padding: 14px;
  border-radius: 12px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center;
  appearance: none; -webkit-appearance: none;
}
.dbtn:active { transform: scale(0.97); }
.dbtn.pt { background: linear-gradient(135deg, #0b7da0, var(--teal)); color: #fff; box-shadow: 0 4px 20px rgba(14,165,201,0.3); }
.dbtn.pa { background: linear-gradient(135deg, #b45309, var(--amber)); color: #1a0e00; box-shadow: 0 4px 20px rgba(251,191,36,0.25); }
.dbtn.sec { background: var(--surf); color: var(--muted); border: 1px solid var(--border); }
.dbtn.hm  { background: var(--surf); color: var(--muted); border: 1px solid var(--border); }

@media (max-width: 420px) {
  .home-h1 { font-size: 24px; }
  .ctext { font-size: 15px; }
  .back .ctext { font-size: 13px; }
  .card { height: 270px; }
  .kbhint { display: none; }
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="eyebrow">Kapitel 4 · Zivilrecht für Unternehmen</div>
  <h1 class="home-h1">Wirtschafts<em>recht</em><br>Karteikarten</h1>
  <p class="home-sub">Wähle ein Set zum Lernen</p>

  <button class="set-btn s1" id="btn1" type="button">
    <div class="set-top">
      <div>
        <div class="set-badge">Set 1 · Empfohlen</div>
        <div class="set-name">Kernkonzepte Unternehmensrecht</div>
      </div>
      <div class="set-count">20<span>Karten</span></div>
    </div>
    <div class="set-desc">Grundlegende Themen: UGB, Firmenbuch, Vollmachten, Prokura, Firmennamen und Vermittler.</div>
    <div class="tags">
      <span class="tag">UGB & Unternehmer</span>
      <span class="tag">Firmenbuch</span>
      <span class="tag">Prokura</span>
      <span class="tag">Handlungsvollmacht</span>
      <span class="tag">Firmenrecht</span>
      <span class="tag">Makler & Kommission</span>
    </div>
    <div class="arrow">→</div>
  </button>

  <button class="set-btn s2" id="btn2" type="button">
    <div class="set-top">
      <div>
        <div class="set-badge">Set 2 · Erweitert</div>
        <div class="set-name">Vertiefung & Übungsaufgaben</div>
      </div>
      <div class="set-count">43<span>Karten</span></div>
    </div>
    <div class="set-desc">Detailliertere Fragen inkl. Übungsaufgaben (Ü 4.x), Grenzfälle und Spezialthemen.</div>
    <div class="tags">
      <span class="tag">Filialprokura</span>
      <span class="tag">Negative Publizität</span>
      <span class="tag">Lagervollmacht</span>
      <span class="tag">Übungsaufgaben</span>
      <span class="tag">GmbH & OG</span>
    </div>
    <div class="warn">⚠️ Möglicherweise Fehler – Antworten kritisch prüfen!</div>
    <div class="arrow">→</div>
  </button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen hidden">
  <div class="qhead">
    <button class="back" id="backBtn" type="button">←</button>
    <div class="qhead-text">
      <div class="qlabel" id="qlabel"></div>
      <div class="qtitle" id="qtitle"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="sn t" id="stTotal">0</div><div class="sl">Gesamt</div></div>
    <div class="stat"><div class="sn t" id="stCur">1</div><div class="sl">Aktuell</div></div>
    <div class="stat"><div class="sn g" id="stKnow">0</div><div class="sl">Kann ich ✓</div></div>
    <div class="stat"><div class="sn r" id="stAgain">0</div><div class="sl">Nochmal ✗</div></div>
  </div>

  <div class="pbar-wrap">
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="plabels"><span id="pleft">0 / 0 erledigt</span><span id="ppct">0%</span></div>
  </div>

  <div class="modes">
    <button class="mbtn" id="mbAll" type="button">🃏 Alle</button>
    <button class="mbtn" id="mbAgain" type="button">🔁 Nochmal (0)</button>
  </div>

  <div class="card-area">
    <div class="card" id="card">
      <div class="face front" id="front">
        <div class="clabel" id="flbl">Frage</div>
        <div class="ctext" id="ftxt"></div>
        <div class="chint">Tippe zum Umdrehen</div>
      </div>
      <div class="face back" id="back">
        <div class="clabel" id="blbl">Antwort</div>
        <div class="ctext" id="btxt"></div>
        <div class="chint">Wähle unten</div>
      </div>
    </div>
  </div>

  <div class="btns">
    <button class="btn bflip" id="flipBtn" type="button">↩ Umdrehen</button>
    <div class="abts" id="abts">
      <button class="btn bno"  id="noBtn"  type="button">✗ Nochmal</button>
      <button class="btn byes" id="yesBtn" type="button">✓ Kann ich!</button>
    </div>
  </div>

  <div class="kbhint">
    <span class="kb-key"><kbd>Space</kbd> umdrehen</span>
    <span class="kb-key"><kbd>←</kbd> Nochmal</span>
    <span class="kb-key"><kbd>→</kbd> Kann ich!</span>
    <span class="kb-key"><kbd>Esc</kbd> Zurück</span>
  </div>
</div>

<!-- DONE -->
<div id="done" class="screen hidden">
  <div class="done-icon">🎉</div>
  <div class="done-h">Runde abgeschlossen!</div>
  <div class="score">
    <div class="sc"><div class="scn g" id="dKnow">0</div><div class="scl">Kann ich</div></div>
    <div class="sc"><div class="scn r" id="dAgain">0</div><div class="scl">Nochmal</div></div>
  </div>
  <div class="done-msg" id="dmsg"></div>
  <button class="dbtn" id="dRestart" type="button">🔁 Alle Karten wiederholen</button>
  <button class="dbtn sec" id="dAgainOnly" type="button">🎯 Nur Nochmal-Karten</button>
  <button class="dbtn hm"  id="dHome"    type="button">🏠 Zurück zur Set-Auswahl</button>
</div>

<script>
'use strict';

// ── DATA ──────────────────────────────────────────────────────────────
const DATA = {
  1: {
    label: 'Set 1 · Empfohlen', title: 'Kernkonzepte',
    th: 't',
    cards: [
      {q:"Ab wann gilt eine Tätigkeit als \u201eunternehmerisch" im Sinne des UGB?", a:"Wenn sie selbstständig, auf Dauer angelegt, mit einer Organisation versehen ist und Leistungen gegen Entgelt am Markt anbietet."},
      {q:"Wer gilt als Unternehmer \u201ekraft Rechtsform"?", a:"Bestimmte juristische Personen wie AG, GmbH, OG, KG, Genossenschaften, Sparkassen und die EWIV."},
      {q:'Richtig oder Falsch? Ein Sportverein, der seine Ausgaben ausschließlich durch Mitgliedsbeiträge deckt, ist Unternehmer im Sinne des UGB.', a:'❌ FALSCH. Er erbringt keine Leistungen gegen Entgelt am Markt, um seine Kosten zu decken.'},
      {q:'Was ist der Unterschied zwischen deklarativer und konstitutiver Wirkung im Firmenbuch?', a:'Deklarativ: Die Rechtslage besteht bereits (z. B. Prokuraerteilung).\nKonstitutiv: Die Rechtslage entsteht erst durch die Eintragung (z. B. Gründung einer GmbH).'},
      {q:'Darf jede Person ohne Angabe von Gründen Einsicht in das Firmenbuch nehmen?', a:'✅ JA. Das Firmenbuch ist ein öffentliches Verzeichnis und gegen Gebühr für jedermann zugänglich.'},
      {q:"Welchen zwingenden Firmenzusatz benötigt ein im Firmenbuch eingetragener Einzelunternehmer?", a:"Den Zusatz \u201ee.U." (eingetragene Unternehmerin / eingetragener Unternehmer)."},
      {q:'Darf ein Prokurist ohne spezielle Erlaubnis eine Hypothek auf ein Betriebsgrundstück aufnehmen?', a:'❌ NEIN. Zur Belastung (und zum Verkauf) von Grundstücken ist eine Spezialvollmacht erforderlich.'},
      {q:"Was bedeutet das Kürzel \u201eppa." vor einer Unterschrift?", a:"\u201eper procura" – es kennzeichnet, dass die Person mit einer Prokura zeichnet."},
      {q:'Richtig oder Falsch? Die Prokura kann auch schlüssig (durch bloßes Handeln) erteilt werden.', a:'❌ FALSCH. Die Prokura muss ausdrücklich (mündlich oder schriftlich) erteilt werden.'},
      {q:'Darf ein Generalhandlungsvollmächtigter für das Unternehmen eigenständig Kredite aufnehmen?', a:'❌ NEIN. Für die Aufnahme von Darlehen (Krediten) ist gesetzlich eine Spezialvollmacht vorgeschrieben.'},
      {q:"Wie muss ein Handlungsbevollmächtigter im Gegensatz zum Prokuristen unterschreiben?", a:"Mit einem Zusatz, der die Handlungsvollmacht andeutet: \u201ei.V." (in Vertretung) oder \u201ei.A." (im Auftrag)."},
      {q:'Richtig oder Falsch? Eine Handlungsvollmacht kann im Gegensatz zur Prokura auch schlüssig erteilt werden.', a:'✅ RICHTIG.'},
      {q:'Was ist der entscheidende Unterschied zwischen einem Handelsvertreter und einem Makler?', a:'Der Handelsvertreter ist ständig mit der Vermittlung betraut; der Makler wird nur im Einzelfall (gelegentlich) tätig.'},
      {q:'Wer trägt das wirtschaftliche Risiko beim Kommissionsgeschäft?', a:'Der Kommittent – der Kommissionär handelt zwar im eigenen Namen, aber für fremde Rechnung.'},
      {q:'Richtig oder Falsch? Ein Spediteur ist eine Person, die den physischen Transport der Ware selbst durchführt.', a:'❌ FALSCH. Der Spediteur organisiert den Transport; die Person, die ihn durchführt, ist der Frachtführer.'},
      {q:'Welcher Grundsatz besagt, dass eine neue Firma sich deutlich von bereits bestehenden Firmen am selben Ort unterscheiden muss?', a:'Der Grundsatz der Firmenausschließlichkeit.'},
      {q:"Darf ein Einzelunternehmen unter einer reinen Sachbezeichnung wie \u201eBäckerei" ohne weitere Zusätze geführt werden?", a:"❌ NEIN. Die Firma muss den Namen des Inhabers oder eine Fantasiebezeichnung mit dem Zusatz \u201ee.U." enthalten."},
      {q:"Was versteht man unter einer \u201eGesamtprokura"?", a:"Eine Prokura, die an mehrere Personen so erteilt wurde, dass sie nur gemeinsam zeichnungsberechtigt sind."},
      {q:'Richtig oder Falsch? Ein Makler kann als Doppelmakler für beide Vertragsparteien tätig sein.', a:'✅ RICHTIG – er muss dabei jedoch die Interessen beider Parteien gleichermaßen wahren.'},
      {q:'Welche fünf Informationen müssen zwingend auf den Geschäftspapieren eines im Firmenbuch eingetragenen Unternehmens stehen?', a:'1. Firma\n2. Rechtsform\n3. Sitz des Unternehmens\n4. Firmenbuchnummer\n5. Firmenbuchgericht'},
    ]
  },
  2: {
    label: 'Set 2 · Erweitert', title: 'Vertiefung & Übungen',
    th: 'a',
    cards: [
      {q:'Welche vier Merkmale definieren eine unternehmerische Tätigkeit?', a:'Selbstständigkeit, Dauerhaftigkeit, Organisation und Angebot von Leistungen gegen Entgelt am Markt.'},
      {q:'Wer gilt als Unternehmer kraft Rechtsform?', a:'Juristische Personen wie AG, GmbH, OG, KG, Genossenschaften, Sparkassen und die EWIV.'},

// ── STATE ──────────────────────────────────────────────────────────────
let SET, allCards, deck, again, cur, knows, nopes, isFlipped, mode;

// ── HELPERS ────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function show(id)  { document.getElementById(id).classList.remove('hidden'); }
function hide(id)  { document.getElementById(id).classList.add('hidden'); }

// ── SCREENS ────────────────────────────────────────────────────────────
function goHome() {
  show('home'); hide('quiz'); hide('done');
}

function startSet(n) {
  SET = DATA[n];
  allCards = SET.cards;
  again = []; knows = 0; nopes = 0; cur = 0; mode = 'all';
  deck = shuffle([...allCards]);

  // Apply theme
  const th = SET.th;
  document.getElementById('qlabel').textContent = SET.label;
  document.getElementById('qlabel').className   = 'qlabel ' + (th==='t' ? 'teal' : 'amber');
  document.getElementById('qtitle').textContent = SET.title;
  document.getElementById('pfill').className    = 'pfill ' + th;
  document.getElementById('dRestart').className = 'dbtn ' + (th==='t' ? 'pt' : 'pa');

  // Card theme
  document.getElementById('front').className = 'face front ' + th;
  document.getElementById('back').className  = 'face back '  + th;
  document.getElementById('flbl').className  = 'clabel ' + th;
  document.getElementById('blbl').className  = 'clabel ' + th;

  updateModeBtns();
  hide('home'); hide('done'); show('quiz');
  loadCard();
}

// ── QUIZ LOGIC ─────────────────────────────────────────────────────────
function updateModeBtns() {
  const ac = SET.th === 't' ? 'at' : 'aa';
  document.getElementById('mbAll').className   = 'mbtn' + (mode==='all'   ? ' '+ac : '');
  document.getElementById('mbAgain').className = 'mbtn' + (mode==='again' ? ' '+ac : '');
  document.getElementById('mbAll').textContent   = '🃏 Alle (' + allCards.length + ')';
  document.getElementById('mbAgain').textContent = '🔁 Nochmal (' + again.length + ')';
}

function loadCard() {
  const c = deck[cur];
  document.getElementById('ftxt').textContent = c.q;
  document.getElementById('btxt').textContent = c.a;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('abts').classList.remove('show');
  isFlipped = false;

  const done  = knows + nopes;
  const total = allCards.length;
  const pct   = total ? Math.round(done/total*100) : 0;

  document.getElementById('stTotal').textContent = deck.length;
  document.getElementById('stCur').textContent   = cur + 1;
  document.getElementById('stKnow').textContent  = knows;
  document.getElementById('stAgain').textContent = nopes;
  document.getElementById('pfill').style.width   = pct + '%';
  document.getElementById('pleft').textContent   = done + ' / ' + total + ' erledigt';
  document.getElementById('ppct').textContent    = pct + '%';
  updateModeBtns();
}

function flip() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('abts').classList.toggle('show', isFlipped);
}

function answer(knew) {
  if (!isFlipped) { flip(); return; }
  if (knew) { knows++; }
  else {
    nopes++;
    if (!again.find(c => c.q === deck[cur].q)) again.push(deck[cur]);
  }
  cur++;
  if (cur >= deck.length) showDone(); else loadCard();
}

function showDone() {
  hide('quiz'); show('done');
  document.getElementById('dKnow').textContent  = knows;
  document.getElementById('dAgain').textContent = nopes;
  const pct = allCards.length ? Math.round(knows/allCards.length*100) : 0;
  document.getElementById('dmsg').textContent =
    pct===100 ? '🏆 Perfekt! Du kennst alle Karten!' :
    pct>=80   ? 'Stark! '+pct+'% gewusst. Fast geschafft!' :
    pct>=50   ? pct+'% gewusst – du bist auf dem richtigen Weg!' :
                pct+'% gewusst – wiederhole die Nochmal-Karten!';
  document.getElementById('dAgainOnly').style.display = again.length ? '' : 'none';
}

function restart(onlyAgain) {
  knows = 0; nopes = 0; cur = 0;
  if (onlyAgain && again.length) {
    deck = shuffle([...again]);
    again = [];
  } else {
    deck = shuffle([...allCards]);
    again = [];
    mode = 'all';
  }
  updateModeBtns();
  hide('done'); show('quiz');
  loadCard();
}

// ── EVENT LISTENERS ────────────────────────────────────────────────────
document.getElementById('btn1').addEventListener('click', function() { startSet(1); });
document.getElementById('btn2').addEventListener('click', function() { startSet(2); });
document.getElementById('backBtn').addEventListener('click', goHome);
document.getElementById('flipBtn').addEventListener('click', flip);
document.getElementById('noBtn').addEventListener('click',  function() { answer(false); });
document.getElementById('yesBtn').addEventListener('click', function() { answer(true); });
document.getElementById('card').addEventListener('click', flip);
document.getElementById('mbAll').addEventListener('click',   function() { mode='all';   updateModeBtns(); });
document.getElementById('mbAgain').addEventListener('click', function() { mode='again'; updateModeBtns(); });
document.getElementById('dRestart').addEventListener('click',   function() { restart(false); });
document.getElementById('dAgainOnly').addEventListener('click', function() { restart(true); });
document.getElementById('dHome').addEventListener('click', goHome);

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('quiz').classList.contains('hidden')) {
    if (e.code === 'Space')       { e.preventDefault(); flip(); }
    else if (e.code === 'ArrowLeft'  && isFlipped) answer(false);
    else if (e.code === 'ArrowRight' && isFlipped) answer(true);
    else if (e.code === 'Escape') goHome();
  }
});

// Touch swipe on card
var tx0 = 0;
document.getElementById('card').addEventListener('touchstart', function(e) {
  tx0 = e.changedTouches[0].clientX;
}, { passive: true });
document.getElementById('card').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 55 && isFlipped) answer(dx > 0);
}, { passive: true });
</script>
