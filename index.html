<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unternehmensrecht UGB — Karteikarten</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a72;

    --blue-dark: #042C53;
    --blue-mid: #185FA5;
    --blue-light: #378ADD;
    --blue-pale: #85B7EB;
    --blue-ghost: #0d1e30;

    --teal-dark: #04342C;
    --teal-mid: #0F6E56;
    --teal-light: #1D9E75;
    --teal-pale: #5DCAA5;
    --teal-ghost: #081c17;

    --amber-dark: #412402;
    --amber-mid: #854F0B;
    --amber-light: #BA7517;
    --amber-pale: #EF9F27;
    --amber-ghost: #1e1205;

    --gold-dark: #633806;
    --gold-mid: #854F0B;
    --gold-light: #d4900a;
    --gold-pale: #FAC775;
    --gold-ghost: #1f1508;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid #ffffff12;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  header span {
    font-size: 0.75rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .set-tabs {
    display: flex;
    gap: 0;
    padding: 2rem 2rem 0;
    border-bottom: 1px solid #ffffff10;
  }

  .tab-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0.75rem 1.5rem;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }

  .tab-btn.active-blue {
    color: var(--blue-pale);
    border-bottom-color: var(--blue-light);
  }

  .tab-btn.active-amber {
    color: var(--amber-pale);
    border-bottom-color: var(--amber-light);
  }

  .tab-btn:hover {
    color: var(--text);
  }

  .set-panel {
    display: none;
    padding: 2rem;
  }

  .set-panel.active {
    display: block;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .progress-info {
    font-size: 0.8rem;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .progress-bar-wrap {
    height: 2px;
    background: #ffffff10;
    border-radius: 2px;
    flex: 1;
    min-width: 120px;
    max-width: 220px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .blue .progress-bar-fill { background: var(--blue-light); }
  .amber .progress-bar-fill { background: var(--amber-light); }

  .nav-btns {
    display: flex;
    gap: 0.5rem;
  }

  .nav-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
  }

  .blue .nav-btn {
    color: var(--blue-pale);
    border-color: var(--blue-mid);
  }

  .blue .nav-btn:hover {
    background: var(--blue-ghost);
    border-color: var(--blue-light);
  }

  .amber .nav-btn {
    color: var(--amber-pale);
    border-color: var(--amber-mid);
  }

  .amber .nav-btn:hover {
    background: var(--amber-ghost);
    border-color: var(--amber-light);
  }

  .card-stage {
    perspective: 1200px;
    max-width: 720px;
    margin: 0 auto 2rem;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 320px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    min-height: 320px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
  }

  .card-back {
    transform: rotateY(180deg);
  }

  .blue .card-face.card-front {
    background: linear-gradient(145deg, #0d1e30 0%, #0a1824 100%);
    border: 1px solid var(--blue-mid);
    box-shadow: 0 0 0 1px #185FA520, inset 0 1px 0 #ffffff08;
  }

  .blue .card-face.card-back {
    background: linear-gradient(145deg, #081c17 0%, #061512 100%);
    border: 1px solid var(--teal-mid);
    box-shadow: 0 0 0 1px #1D9E7520, inset 0 1px 0 #ffffff08;
  }

  .amber .card-face.card-front {
    background: linear-gradient(145deg, #1e1205 0%, #180f04 100%);
    border: 1px solid var(--amber-mid);
    box-shadow: 0 0 0 1px #BA751720, inset 0 1px 0 #ffffff08;
  }

  .amber .card-face.card-back {
    background: linear-gradient(145deg, #1f1508 0%, #190f05 100%);
    border: 1px solid var(--gold-mid);
    box-shadow: 0 0 0 1px #d4900a20, inset 0 1px 0 #ffffff08;
  }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
  }

  .blue .card-front .card-label { color: var(--blue-pale); }
  .blue .card-front .card-label::before { background: var(--blue-pale); }
  .blue .card-back .card-label { color: var(--teal-pale); }
  .blue .card-back .card-label::before { background: var(--teal-pale); }

  .amber .card-front .card-label { color: var(--amber-pale); }
  .amber .card-front .card-label::before { background: var(--amber-pale); }
  .amber .card-back .card-label { color: var(--gold-pale); }
  .amber .card-back .card-label::before { background: var(--gold-pale); }

  .card-question {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
    display: flex;
    align-items: center;
  }

  .card-answer {
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    flex: 1;
    display: flex;
    align-items: center;
  }

  .card-hint {
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-top: 2rem;
    text-align: center;
  }

  .rating-row {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .rate-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1.25rem;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
  }

  .rate-btn.correct {
    color: #5DCAA5;
    border-color: #0F6E5680;
  }

  .rate-btn.correct:hover { background: #04342C; }

  .rate-btn.wrong {
    color: #f09595;
    border-color: #a32d2d80;
  }

  .rate-btn.wrong:hover { background: #500a0a; }

  .mini-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    gap: 5px;
    max-width: 720px;
    margin: 0 auto;
  }

  .mini-dot {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    border: 1px solid #ffffff10;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--bg3);
    font-size: 0.55rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
  }

  .mini-dot:hover { border-color: #ffffff30; }

  .blue .mini-dot.current { border-color: var(--blue-light); background: var(--blue-ghost); color: var(--blue-pale); }
  .blue .mini-dot.correct { background: #04342C; border-color: var(--teal-mid); color: var(--teal-pale); }
  .blue .mini-dot.wrong { background: #1a0a0a; border-color: #a32d2d; color: #f09595; }

  .amber .mini-dot.current { border-color: var(--amber-light); background: var(--amber-ghost); color: var(--amber-pale); }
  .amber .mini-dot.correct { background: #04342C; border-color: var(--teal-mid); color: var(--teal-pale); }
  .amber .mini-dot.wrong { background: #1a0a0a; border-color: #a32d2d; color: #f09595; }

  .shuffle-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    border: 1px solid #ffffff15;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.15s ease;
  }

  .shuffle-btn:hover { background: var(--bg3); color: var(--text); border-color: #ffffff25; }

  .summary-box {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #ffffff10;
    background: var(--bg2);
  }

  .summary-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
  }

  .summary-box p { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }

  .restart-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    border: 1px solid;
    cursor: pointer;
    background: transparent;
    transition: all 0.15s ease;
  }

  .blue .restart-btn { color: var(--blue-pale); border-color: var(--blue-mid); }
  .blue .restart-btn:hover { background: var(--blue-ghost); }
  .amber .restart-btn { color: var(--amber-pale); border-color: var(--amber-mid); }
  .amber .restart-btn:hover { background: var(--amber-ghost); }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .set-tabs { padding: 1rem 1rem 0; }
    .set-panel { padding: 1rem; }
    .card-face { padding: 1.5rem; min-height: 260px; }
    .card-inner { min-height: 260px; }
    .card-question { font-size: 1rem; }
    .card-answer { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Unternehmensrecht UGB</h1>
  <span>Karteikarten · Wirtschaft</span>
</header>

<div class="set-tabs">
  <button class="tab-btn active-blue" onclick="switchSet('blue')">Set 1 · Ozean (20 Karten)</button>
  <button class="tab-btn" onclick="switchSet('amber')">Set 2 · Ambra (42 Karten)</button>
</div>

<div id="panel-blue" class="set-panel blue active">
  <div class="controls">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
      <span class="progress-info" id="b-progress">Karte 1 von 20</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="b-bar" style="width:5%"></div></div>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <button class="shuffle-btn" onclick="shuffle('b')">Mischen</button>
      <div class="nav-btns">
        <button class="nav-btn" onclick="prev('b')">← Zurück</button>
        <button class="nav-btn" onclick="next('b')">Weiter →</button>
      </div>
    </div>
  </div>

  <div class="card-stage" onclick="flip('b')">
    <div class="card-inner" id="b-card">
      <div class="card-face card-front">
        <div class="card-label">Frage</div>
        <div class="card-question" id="b-q"></div>
        <div class="card-hint">Klicken zum Umdrehen</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Antwort</div>
        <div class="card-answer" id="b-a"></div>
        <div class="card-hint">Klicken zum Umdrehen</div>
      </div>
    </div>
  </div>

  <div class="rating-row" id="b-rating">
    <button class="rate-btn correct" onclick="rate('b','correct')">✓ Gewusst</button>
    <button class="rate-btn wrong" onclick="rate('b','wrong')">✗ Noch nicht</button>
  </div>

  <div class="mini-grid blue" id="b-dots"></div>

  <div class="summary-box" id="b-summary" style="display:none">
    <h2 id="b-sum-title"></h2>
    <p id="b-sum-text"></p>
    <button class="restart-btn" onclick="restart('b')">Nochmal von vorne</button>
  </div>
</div>

<div id="panel-amber" class="set-panel amber">
  <div class="controls">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
      <span class="progress-info" id="a-progress">Karte 1 von 42</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="a-bar" style="width:2%"></div></div>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <button class="shuffle-btn" onclick="shuffle('a')">Mischen</button>
      <div class="nav-btns">
        <button class="nav-btn" onclick="prev('a')">← Zurück</button>
        <button class="nav-btn" onclick="next('a')">Weiter →</button>
      </div>
    </div>
  </div>

  <div class="card-stage" onclick="flip('a')">
    <div class="card-inner" id="a-card">
      <div class="card-face card-front">
        <div class="card-label">Frage</div>
        <div class="card-question" id="a-q"></div>
        <div class="card-hint">Klicken zum Umdrehen</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Antwort</div>
        <div class="card-answer" id="a-a"></div>
        <div class="card-hint">Klicken zum Umdrehen</div>
      </div>
    </div>
  </div>

  <div class="rating-row" id="a-rating">
    <button class="rate-btn correct" onclick="rate('a','correct')">✓ Gewusst</button>
    <button class="rate-btn wrong" onclick="rate('a','wrong')">✗ Noch nicht</button>
  </div>

  <div class="mini-grid amber" id="a-dots"></div>

  <div class="summary-box" id="a-summary" style="display:none">
    <h2 id="a-sum-title"></h2>
    <p id="a-sum-text"></p>
    <button class="restart-btn" onclick="restart('a')">Nochmal von vorne</button>
  </div>
</div>

<script>
const DATA = {
  b: {
    cards: [
      {q:"Ab wann gilt eine Tätigkeit als „unternehmerisch" im Sinne des UGB?", a:"Wenn sie selbstständig, auf Dauer angelegt, mit einer Organisation versehen ist und Leistungen gegen Entgelt am Markt anbietet."},
      {q:"Wer gilt als Unternehmer „kraft Rechtsform"?", a:"Bestimmte juristische Personen wie AG, GmbH, OG, KG, Genossenschaften, Sparkassen und die EWIV."},
      {q:"Richtig oder Falsch? Ein Sportverein, der seine Ausgaben ausschließlich durch Mitgliedsbeiträge deckt, ist Unternehmer im Sinne des UGB.", a:"Falsch. Er erbringt keine Leistungen gegen Entgelt am Markt, um seine Kosten zu decken."},
      {q:"Was ist der Unterschied zwischen deklarativer und konstitutiver Wirkung im Firmenbuch?", a:"Deklarativ bedeutet, eine Rechtslage besteht bereits (z. B. Prokuraerteilung); konstitutiv bedeutet, die Rechtslage entsteht erst durch die Eintragung (z. B. Gründung einer GmbH)."},
      {q:"Darf jede Person ohne Angabe von Gründen Einsicht in das Firmenbuch nehmen?", a:"Ja, das Firmenbuch ist ein öffentliches Verzeichnis und gegen Gebühr für jedermann zugänglich."},
      {q:"Welchen zwingenden Firmenzusatz benötigt ein im Firmenbuch eingetragener Einzelunternehmer?", a:"Den Zusatz „e.U." (eingetragene Unternehmerin / eingetragener Unternehmer)."},
      {q:"Darf ein Prokurist ohne spezielle Erlaubnis eine Hypothek auf ein Betriebsgrundstück aufnehmen?", a:"Nein, zur Belastung (und zum Verkauf) von Grundstücken ist eine Spezialvollmacht erforderlich."},
      {q:"Was bedeutet das Kürzel „ppa." vor einer Unterschrift?", a:"„per procura"; es kennzeichnet, dass die Person mit einer Prokura zeichnet."},
      {q:"Richtig oder Falsch? Die Prokura kann auch schlüssig (durch bloßes Handeln) erteilt werden.", a:"Falsch. Die Prokura muss ausdrücklich (mündlich oder schriftlich) erteilt werden."},
      {q:"Darf ein Generalhandlungsvollmächtigter für das Unternehmen eigenständig Kredite aufnehmen?", a:"Nein, für die Aufnahme von Darlehen (Krediten) ist gesetzlich eine Spezialvollmacht vorgeschrieben."},
      {q:"Wie muss ein Handlungsbevollmächtigter im Gegensatz zum Prokuristen unterschreiben?", a:"Mit einem Zusatz, der die Handlungsvollmacht andeutet, wie „i.V." (in Vertretung) oder „i.A." (im Auftrag)."},
      {q:"Richtig oder Falsch? Eine Handlungsvollmacht kann im Gegensatz zur Prokura auch schlüssig erteilt werden.", a:"Richtig."},
      {q:"Was ist der entscheidende Unterschied zwischen einem Handelsvertreter und einem Makler?", a:"Der Handelsvertreter ist ständig mit der Vermittlung betraut; der Makler wird nur im Einzelfall (gelegentlich) tätig."},
      {q:"Wer trägt das wirtschaftliche Risiko beim Kommissionsgeschäft?", a:"Der Kommittent, da der Kommissionär zwar im eigenen Namen, aber für fremde Rechnung handelt."},
      {q:"Richtig oder Falsch? Ein Spediteur ist eine Person, die den physischen Transport der Ware selbst durchführt.", a:"Falsch. Der Spediteur organisiert den Transport; die Person, die ihn durchführt, ist der Frachtführer."},
      {q:"Welcher Grundsatz besagt, dass eine neue Firma sich deutlich von bereits bestehenden Firmen am selben Ort unterscheiden muss?", a:"Der Grundsatz der Firmenausschließlichkeit."},
      {q:"Darf ein Einzelunternehmen unter einer reinen Sachbezeichnung wie „Bäckerei" ohne weitere Zusätze geführt werden?", a:"Nein, die Firma muss den Namen des Inhabers oder eine Fantasiebezeichnung mit dem Zusatz „e.U." enthalten."},
      {q:"Was versteht man unter einer „Gesamtprokura"?", a:"Eine Prokura, die an mehrere Personen so erteilt wurde, dass sie nur gemeinsam zeichnungsberechtigt sind."},
      {q:"Richtig oder Falsch? Ein Makler kann als Doppelmakler für beide Vertragsparteien tätig sein.", a:"Richtig, er muss dabei jedoch die Interessen beider Parteien gleichermaßen wahren."},
      {q:"Welche fünf Informationen müssen zwingend auf den Geschäftspapieren eines im Firmenbuch eingetragenen Unternehmens stehen?", a:"Firma, Rechtsform, Sitz des Unternehmens, Firmenbuchnummer und das Firmenbuchgericht."}
    ],
    idx: 0, flipped: false, ratings: {}
  },
  a: {
    cards: [
      {q:"Welche vier Merkmale definieren eine unternehmerische Tätigkeit?", a:"Selbstständigkeit, Dauerhaftigkeit, Organisation und Angebot von Leistungen gegen Entgelt am Markt."},
      {q:"Wer gilt als Unternehmer kraft Rechtsform?", a:"Juristische Personen wie AG, GmbH, OG, KG, Genossenschaften, Sparkassen und die EWIV."},
      {q:"Gilt ein Rechtsanwalt immer als Unternehmer im Sinne aller UGB-Vorschriften?", a:"Nein, für freie Berufe gelten nur die Regeln über unternehmensbezogene Geschäfte, es sei denn, sie sind kraft Rechtsform oder Eintragung Unternehmer."},
      {q:"Ü 4.2: Ist eine Druckerei ein Unternehmen im Sinne des UGB?", a:"Ja, da sie alle Merkmale einer unternehmerischen Tätigkeit erfüllt."},
      {q:"Ü 4.2: Ist ein Sportverein, der sich nur durch Mitgliedsbeiträge finanziert, ein Unternehmen im Sinne des UGB?", a:"Nein, da er keine Leistungen gegen Entgelt am Markt anbietet, um seine Kosten zu decken."},
      {q:"Was ist der Unterschied zwischen deklarativer und konstitutiver Eintragung im Firmenbuch?", a:"Deklarativ: Rechtslage besteht schon (z.B. Prokura); Konstitutiv: Rechtslage entsteht erst durch Eintragung (z.B. GmbH-Gründung)."},
      {q:"Was besagt die negative Publizität des Firmenbuchs?", a:"Dass Tatsachen, die eingetragen und bekanntgemacht werden müssten, einem Dritten nicht entgegengehalten werden können, wenn sie nicht eingetragen sind."},
      {q:"Ü 4.4: Können sich Landwirtinnen in das Firmenbuch eintragen lassen?", a:"Richtig, sie können sich freiwillig eintragen lassen."},
      {q:"Ab welcher Umsatzschwelle müssen sich Einzelunternehmer zwingend ins Firmenbuch eintragen lassen?", a:"Wenn der Umsatz in zwei aufeinanderfolgenden Jahren jeweils 700.000 € übersteigt."},
      {q:"Ü 4.5: Wird ein neues Unternehmen automatisch in das Firmenbuch eingetragen?", a:"Falsch, die Eintragung erfolgt nur auf Antrag des Unternehmers (Protokollierung)."},
      {q:"Darf jede Person ohne Angabe von Gründen Einsicht in das Firmenbuch nehmen?", a:"Ja, gegen Gebühr ist die Einsicht für jedermann möglich."},
      {q:"Was ist die Voraussetzung für eine wirksame direkte Stellvertretung?", a:"Offenlegung (Handeln im fremden Namen) und Vertretungsmacht (Berechtigung)."},
      {q:"Ü 4.8: Ist eine Person verpflichtet, eine Bestellung aufzugeben, nur weil sie eine Vollmacht dazu erhalten hat?", a:"Nein, die Vollmacht ist ein rechtliches Können (Willenserklärung), keine Verpflichtung zum Handeln."},
      {q:"Wie muss die Prokura erteilt werden?", a:"Ausdrücklich (mündlich oder schriftlich) und sie muss ins Firmenbuch eingetragen werden."},
      {q:"Was umfasst der gesetzlich fixierte Umfang der Prokura?", a:"Alle Arten von gerichtlichen und außergerichtlichen Geschäften und Rechtshandlungen, die der Betrieb eines Unternehmens mit sich bringt."},
      {q:"Welche Handlungen sind einem Prokuristen gesetzlich untersagt (ohne Spezialvollmacht)?", a:"Veräußerung/Belastung von Grundstücken, Einstellung des Betriebs, Erteilung der Prokura, Unterzeichnung von Bilanz/Inventar."},
      {q:"Was versteht man unter einer „Filialprokura"?", a:"Die Beschränkung der Vertretungsmacht auf eine oder mehrere bestimmte Zweigniederlassungen."},
      {q:"Wie unterschreibt ein Prokurist korrekt?", a:"Mit dem Firmennamen, dem eigenen Namen und einem Zusatz wie „ppa." oder „pp."."},
      {q:"Ü 4.10: Darf ein Prokurist ein Kfz für das Unternehmen anmelden?", a:"Ja, das gehört zum gewöhnlichen Betrieb eines Unternehmens."},
      {q:"Ü 4.10: Darf ein Prokurist einen Kredit für das Unternehmen aufnehmen?", a:"Ja, im Gegensatz zum Handlungsbevollmächtigten darf der Prokurist Kredite aufnehmen."},
      {q:"Kann eine Handlungsvollmacht auch schlüssig (stillschweigend) erteilt werden?", a:"Ja, sie kann ausdrücklich oder schlüssig erteilt werden."},
      {q:"Welche drei Arten der Handlungsvollmacht gibt es?", a:"Generalhandlungsvollmacht, Arthandlungsvollmacht und Spezialhandlungsvollmacht."},
      {q:"Darf ein Handlungsbevollmächtigter ohne Spezialvollmacht Darlehen aufnehmen oder den Betrieb vor Gericht vertreten?", a:"Nein, diese Geschäfte sind ihm gesetzlich untersagt."},
      {q:"Wie unterschreibt ein Handlungsbevollmächtigter?", a:"Mit einem Zusatz wie „i.V." (in Vertretung) oder „i.A." (im Auftrag)."},
      {q:"Was ist eine Laden- und Lagervollmacht?", a:"Wer in einem Laden tätig ist, gilt als ermächtigt, Waren zu verkaufen und den Kaufpreis in Empfang zu nehmen."},
      {q:"Ü 4.12: Ist eine interne Beschränkung der Prokura (z.B. Limit bis 50.000 €) gegenüber Dritten wirksam?", a:"Nein, solche inhaltlichen Beschränkungen sind Dritten gegenüber unwirksam."},
      {q:"Was bezeichnet die „Firma" im rechtlichen Sinne?", a:"Den in das Firmenbuch eingetragenen Namen eines Unternehmers, unter dem er seine Geschäfte betreibt und unterschreibt."},
      {q:"Welchen Zusatz benötigt eine Kommanditgesellschaft zwingend in ihrer Firma?", a:"„KG"."},
      {q:"Was besagt der Grundsatz der Firmenwahrheit?", a:"Die Firma darf keine Angaben enthalten, die über die Art oder den Umfang des Geschäfts täuschen."},
      {q:"Was besagt der Grundsatz der Firmenausschließlichkeit?", a:"Jede neue Firma muss sich von bereits bestehenden Firmen am selben Ort deutlich unterscheiden."},
      {q:"Ü 4.13: Ist die Firma „Foto KG" für ein Einzelunternehmen zulässig?", a:"Nein, da der Zusatz „KG" eine Gesellschaft suggeriert, die nicht existiert (Verstoß gegen Firmenwahrheit)."},
      {q:"Welche Angaben müssen zwingend auf Geschäftspapieren eines im Firmenbuch eingetragenen Unternehmers stehen?", a:"Firma, Rechtsform, Sitz, Firmenbuchnummer und Firmenbuchgericht."},
      {q:"Was ist die Hauptaufgabe eines Spediteurs?", a:"Die Organisation des Gütertransports (Versendung) für Rechnung eines anderen im eigenen Namen."},
      {q:"Was unterscheidet den Kommissionär vom Handelsvertreter?", a:"Der Kommissionär handelt im eigenen Namen (für fremde Rechnung), der Handelsvertreter handelt in fremdem Namen."},
      {q:"Wann hat ein Makler Anspruch auf seine Provision (Courtage)?", a:"Wenn er verdienstlich tätig geworden ist und das Geschäft durch seine Vermittlung abgeschlossen wurde."},
      {q:"Was ist ein „Doppelmakler"?", a:"Ein Makler, der für beide Vertragsparteien (z.B. Käufer und Verkäufer) gleichzeitig tätig ist."},
      {q:"Ü 4.15: Wie nennt man ein selbstständiges Unternehmen, das die Marke und das Know-how eines anderen gegen Entgelt nutzt?", a:"Franchisenehmer."},
      {q:"Ü 4.17: Darf ein Unternehmer den Namen eines Konkurrenten als Werbebezeichnung nutzen, wenn er dadurch Verwechslungen hervorruft?", a:"Nein, das widerspricht dem Firmenrecht und dem Wettbewerbsrecht."},
      {q:"Ü 4.22: Muss ein Kredit, den ein Prokurist trotz internem Verbot aufgenommen hat, vom Unternehmen zurückgezahlt werden?", a:"Ja, da die Beschränkung der Prokura gegenüber der Bank (Dritten) unwirksam ist."},
      {q:"K 4.1: Wer veranlasst die Eintragungen im Firmenbuch?", a:"Das Unternehmen bzw. dessen vertretungsbefugte Organe durch einen entsprechenden Antrag."},
      {q:"Welche Rechtsform hat eine „GmbH"?", a:"Gesellschaft mit beschränkter Haftung (Kapitalgesellschaft)."},
      {q:"Wer haftet bei einer OG (Offene Gesellschaft) für die Schulden?", a:"Die Gesellschafter haften persönlich, unbeschränkt und solidarisch auch mit ihrem Privatvermögen."},
      {q:"Welches Mindeststammkapital ist für die Gründung einer GmbH erforderlich?", a:"Grundsätzlich 35.000 € (davon müssen bei der Gründung mindestens 17.500 € eingezahlt sein; beachte auch gründungsprivilegierte GmbH)."}
    ],
    idx: 0, flipped: false, ratings: {}
  }
};

let activeSet = 'b';
let tabBtns = document.querySelectorAll('.tab-btn');

function switchSet(set) {
  activeSet = set;
  document.getElementById('panel-blue').classList.toggle('active', set === 'b');
  document.getElementById('panel-amber').classList.toggle('active', set === 'a');
  tabBtns[0].classList.toggle('active-blue', set === 'b');
  tabBtns[1].classList.toggle('active-amber', set === 'a');
  render(set);
}

function render(s) {
  const d = DATA[s];
  const card = d.cards[d.idx];
  document.getElementById(s+'-q').textContent = card.q;
  document.getElementById(s+'-a').textContent = card.a;
  const ci = document.getElementById(s+'-card');
  ci.classList.remove('flipped');
  d.flipped = false;
  updateProgress(s);
  renderDots(s);
}

function updateProgress(s) {
  const d = DATA[s];
  const total = d.cards.length;
  const pct = Math.round(((d.idx+1)/total)*100);
  document.getElementById(s+'-progress').textContent = `Karte ${d.idx+1} von ${total}`;
  document.getElementById(s+'-bar').style.width = pct+'%';
}

function flip(s) {
  const d = DATA[s];
  d.flipped = !d.flipped;
  document.getElementById(s+'-card').classList.toggle('flipped', d.flipped);
}

function next(s) {
  const d = DATA[s];
  if(d.idx < d.cards.length-1) { d.idx++; render(s); }
  else { showSummary(s); }
}

function prev(s) {
  const d = DATA[s];
  if(d.idx > 0) { d.idx--; render(s); }
}

function rate(s, result) {
  const d = DATA[s];
  d.ratings[d.idx] = result;
  renderDots(s);
  if(d.idx < d.cards.length-1) { setTimeout(()=>{ d.idx++; render(s); }, 180); }
  else { setTimeout(()=>showSummary(s), 300); }
}

function renderDots(s) {
  const d = DATA[s];
  const container = document.getElementById(s+'-dots');
  container.innerHTML = '';
  d.cards.forEach((c,i) => {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.textContent = i+1;
    if(i === d.idx) dot.classList.add('current');
    if(d.ratings[i] === 'correct') dot.classList.add('correct');
    if(d.ratings[i] === 'wrong') dot.classList.add('wrong');
    dot.onclick = (e) => { e.stopPropagation(); d.idx=i; render(s); };
    container.appendChild(dot);
  });
}

function shuffle(s) {
  const d = DATA[s];
  for(let i=d.cards.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [d.cards[i],d.cards[j]]=[d.cards[j],d.cards[i]];
  }
  d.idx=0; d.ratings={}; d.flipped=false;
  document.getElementById(s+'-summary').style.display='none';
  document.getElementById(s+'-card').style.display='';
  document.getElementById(s+'-rating').style.display='';
  document.getElementById(s+'-dots').style.display='';
  render(s);
}

function showSummary(s) {
  const d = DATA[s];
  const correct = Object.values(d.ratings).filter(r=>r==='correct').length;
  const total = d.cards.length;
  document.getElementById(s+'-card').style.display='none';
  document.getElementById(s+'-rating').style.display='none';
  document.getElementById(s+'-summary').style.display='block';
  document.getElementById(s+'-sum-title').textContent = correct >= total*0.8 ? '🎉 Sehr gut!' : correct >= total*0.5 ? '👍 Guter Fortschritt!' : '💪 Weiter üben!';
  document.getElementById(s+'-sum-text').textContent = `${correct} von ${total} Karten gewusst (${Math.round(correct/total*100)} %)`;
}

function restart(s) {
  const d = DATA[s];
  d.idx=0; d.ratings={}; d.flipped=false;
  document.getElementById(s+'-summary').style.display='none';
  document.getElementById(s+'-card').style.display='';
  document.getElementById(s+'-rating').style.display='';
  document.getElementById(s+'-dots').style.display='';
  render(s);
}

render('b');
render('a');

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight') next(activeSet);
  if(e.key==='ArrowLeft') prev(activeSet);
  if(e.key===' ') { e.preventDefault(); flip(activeSet); }
  if(e.key==='1') rate(activeSet,'correct');
  if(e.key==='2') rate(activeSet,'wrong');
});
</script>
</body>
</html>
